<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Assignment Tracker</title>
</head>
<body>
    <h1>Assignment Tracker</h1>
    <nav>
        <a href="/">Home</a> |
        <a href="/login">Login</a> |
        <a href="/register">Register</a> |
        <a href="/logout">Logout</a>
    </nav>
    <hr>
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <ul>
            {% for message in messages %}
                <li>{{ message }}</li>
            {% endfor %}
            </ul>
        {% endif %}
    {% endwith %}
    {% block body %}{% endblock %}
</body>
</html>
